name: release

# Tag a commit (e.g. `git tag v0.1.0 && git push --tags`) to build the
# brainstorm CLI for linux/macOS (amd64 + arm64) and publish a GitHub Release
# with the binaries + checksums that install.sh downloads.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          version="${GITHUB_REF_NAME}"
          dist="brainstorm_${version}_${GOOS}_${GOARCH}"
          mkdir -p "dist/${dist}"
          go build -trimpath \
            -ldflags "-s -w -X github.com/NosFabrica/brainstorm_one_click_deployment/internal/cli.Version=${version}" \
            -o "dist/${dist}/brainstorm" ./cmd/brainstorm
          cp README.md LICENSE "dist/${dist}/" 2>/dev/null || true
          tar -C dist -czf "dist/${dist}.tar.gz" "${dist}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect archives + checksums
        run: |
          mkdir -p dist
          find artifacts -name '*.tar.gz' -exec cp {} dist/ \;
          cd dist
          sha256sum *.tar.gz > checksums.txt
          cat checksums.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          generate_release_notes: true

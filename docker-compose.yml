services:
  brainstorm-server:
    image: brainstorm-server-service
    container_name: brainstorm-server
    ports:
      - "8000:8000"
    volumes:
      - ./secrets:/run/secrets:rw
    environment:
      deploy_environment: DEV
      auth_algorithm: HS256
      auth_secret_key: supersecretkey
      auth_access_token_expire_minutes: 60
      sql_admin_username: postgres
      sql_admin_password: postgrespw
      sql_admin_secret_key: anothersecret
      db_url: postgresql+asyncpg://postgres:postgrespw@postgres:5432/brainstorm-database
      redis_host: redis_strfry
      redis_port: 6379
      neo4j_db_url: bolt://neo4j:7687
      neo4j_db_username: neo4j
      neo4j_db_password: password
      nostr_transfer_from_relay: wss://wot.grapevine.network
      nostr_transfer_to_relay: ws://neofry:7777
      nostr_upload_ta_events_relay: ws://strfry:7777
      nostr_upload_ta_events_relay_public_url: wss://nip85.nosfabrica.com
      cutoff_of_valid_graperank_scores: 0.02
      perform_nostr_full_sync: true
      frontend_url: https://brainstorm.nosfabrica.com
      public_base_url: https://brainstormserver.nosfabrica.com
      admin_enabled: false
      admin_whitelisted_pubkeys: ""
      vespa_url: http://vespa:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis_strfry:
        condition: service_started
      neo4j:
        condition: service_started
      neofry:
        condition: service_started
      strfry:
        condition: service_started
      vespa-deploy:
        condition: service_completed_successfully
    restart: unless-stopped

  brainstorm-ui:
    image: brainstorm-ui-service
    container_name: brainstorm-ui
    ports:
      - "3000:3000"
    depends_on:
      - brainstorm-server
    restart: unless-stopped
  brainstorm-graperank:
    image: brainstorm-graperank-service
    container_name: brainstorm-graperank
    environment:
      REDIS_HOST: redis_strfry
      REDIS_PORT: 6379
      NEO4J_URL: neo4j://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: password
    depends_on:
      - redis_strfry
      - neo4j
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespw
      POSTGRES_DB: brainstorm-database
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis_strfry:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  neo4j:
    image: neo4j:5
    container_name: neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7688:7687"
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_server_memory_heap_initial__size: 4G
      NEO4J_server_memory_heap_max__size: 4G
      NEO4J_server_memory_pagecache_size: 8G
      NEO4J_server_bolt_telemetry_enabled: "false"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/import
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576

  # NIP-50 search proxy: a stateless WebSocket shim that adds NIP-50 profile
  # search on top of neofry. Intercepts REQs with a `search` field, runs a
  # GrapeRank-ranked search via brainstorm-server, and returns the signed kind-0
  # events from neofry. All other relay traffic is forwarded untouched.
  nip50-proxy:
    image: nip50-proxy-service
    build:
      context: ./nip50-proxy
    container_name: nip50-proxy
    ports:
      - "7781:7781"
    environment:
      NIP50_HOST: 0.0.0.0
      NIP50_PORT: 7781
      BACKING_RELAY_WS: ws://neofry:7777
      BACKING_RELAY_HTTP: http://neofry:7777
      SEARCH_API_URL: http://brainstorm-server:8000
    depends_on:
      neofry:
        condition: service_started
      brainstorm-server:
        condition: service_started
    restart: unless-stopped

  # NOTE: restart neofry if router stops updating, see README.md
  neofry:
    image: ghcr.io/nosfabrica/neofry:latest
    container_name: neofry
    ports:
      - "7777:7777"
    environment:
      ROUTER: /etc/strfry-router.conf
    volumes:
      - neofry-db:/app/strfry-db
      - ./neofry.conf:/etc/strfry.conf
      - ./strfry-router.conf:/etc/strfry-router.conf
    depends_on:
      - redis_strfry
    restart: always
    stop_grace_period: 2m
    labels:
      autoheal: "true"
    ulimits:
      nofile:
        soft: 1000000
        hard: 1000000

  autoheal:
    image: willfarrell/autoheal:latest
    container_name: autoheal
    restart: always
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: 30
      AUTOHEAL_DEFAULT_STOP_TIMEOUT: 30
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  strfry:
    image: ghcr.io/hoytech/strfry:latest
    container_name: strfry
    ports:
      - "7778:7777"
    volumes:
      - strfry-db:/app/strfry-db
      - ./strfry.conf:/etc/strfry.conf
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 1000000
        hard: 1000000

  # Vespa: search engine for nostr profile queries. The application package lives
  # in ./vespa-app (schema + services.xml). The deploy sidecar tars that package
  # and POSTs it to the config server on first startup. Data lives in vespa_var.
  vespa:
    image: vespaengine/vespa
    container_name: vespa
    hostname: vespa
    ports:
      - "8080:8080"     # query / document API
      - "19071:19071"   # config server
    volumes:
      - vespa_var:/opt/vespa/var
    healthcheck:
      test: ["CMD", "curl", "-fSs", "http://localhost:19071/state/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 60s
    restart: unless-stopped

  # Deploys the app package to Vespa AND blocks until the search container is
  # actually serving it. Exit code 0 from this sidecar is the "Vespa is fully
  # ready" signal that brainstorm-server depends on.
  vespa-deploy:
    image: vespaengine/vespa
    container_name: vespa-deploy
    depends_on:
      vespa:
        condition: service_healthy
    volumes:
      - ./vespa-app:/app:ro
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -euo pipefail
        # Fast-path: if Vespa already has the app activated and is serving, skip
        # the (idempotent but slow) re-deploy. Compose re-runs this sidecar on
        # every `up` that touches a dependent service; this keeps that cheap.
        if curl -fSs -o /dev/null http://vespa:8080/ApplicationStatus; then
          echo "[vespa-deploy] vespa is already serving — skip redeploy."
          exit 0
        fi
        echo "[vespa-deploy] packaging app..."
        tar -czf /tmp/app.tgz -C /app .
        echo "[vespa-deploy] prepareandactivate..."
        curl -fSs --data-binary @/tmp/app.tgz \
          -H 'Content-Type: application/x-gzip' \
          http://vespa:19071/application/v2/tenant/default/prepareandactivate
        echo "[vespa-deploy] waiting for container cluster to serve the app..."
        for i in $$(seq 1 120); do
          if curl -fSs -o /dev/null http://vespa:8080/ApplicationStatus; then
            echo "[vespa-deploy] vespa is serving — ready."
            exit 0
          fi
          sleep 2
        done
        echo "[vespa-deploy] timed out waiting for /ApplicationStatus" >&2
        exit 1
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neofry-db:
  strfry-db:
  vespa_var: